server:
  port: 8083

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/admin
    username: root
    password: your_mysql_password

# 配置mybatis实体和xml映射
mybatis:
  ## 映射xml
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # 配置日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# Redis配置
redis:
  # Redis服务器地址
  host: 127.0.0.1
  # Redis服务器连接端口
  port: 6379
  # Redis服务器连接密码（默认为空）
  password: your_redis_password
  # 连接超时时间（毫秒）
  timeout: 1800000
  # Redis数据库索引（默认为0）
  database: 0
  # 连接池驱动的配置
  lettuce:
    pool:
      # 连接池中最大连接数
      max-active: 20
      # 取得连接的最大等待时间 -1 表示没限制
      max-wait: -1
      # 连接池中允许空闲连接的最大数量
      max-idle: 8
      # 连接池中空闲连接的最小数量
      min-idle: 2